name: CI CD Pipeline

on: workflow_dispatch

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}

      - name: Build Image
        run: |
          docker build -t ${{secrets.DOCKER_USERNAME}}/github-actions-learning:latest .

      - name: Push Image
        run: |
          docker push ${{secrets.DOCKER_USERNAME}}/github-actions-learning:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            docker push ${{secrets.DOCKER_USERNAME}}/github-actions-learning:latest
            docker stop app || true
            docker rm app || true
            docker run -d --name app -p 80:5000 ${{secrets.DOCKER_USERNAME}}/github-actions-learning:latest








    
          
