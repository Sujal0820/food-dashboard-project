name: Reusable CI

on:
  workflow_call:
    inputs:
      username: 
        required: true
        type: string
    secrets:
      my_secret: 
        required: true

jobs:
  reusable-job:
    runs-on: ubuntu-latest

    steps:
      - name: Print Username
        run: echo "Hello from ${{inputs.username}}"
      - name: Use Secret
        run: echo "Secret Recevied"
